version: '3.8'

services:
  # 1. Kendi Yazdığımız Node.js Uygulaması
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: http-lab-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    # DATABASE_URL artık SADECE .env dosyasından okunuyor (bkz. LEARNING_LOG.md).
    # Not: .env içindeki DATABASE_URL host adı olarak 'db' kullanmalı (Docker
    # servis adı), 'localhost' değil — container'ın kendi içinde 'localhost'
    # PostgreSQL'in çalıştığı 'db' container'ını değil, 'app' container'ının
    # kendisini işaret eder.
    env_file:
      - .env

  # 2. PostgreSQL Veritabanı
  db:
    image: postgres:15-alpine
    container_name: http-lab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Trabzon.4002
      POSTGRES_DB: http_lab_db
    # Host'a port açmıyoruz: veritabanına sadece Docker'ın iç ağındaki
    # (aynı docker-compose ağındaki) servisler ('app', 'adminer') erişebilir.
    # Production'da veritabanı portunun dışarıya (host makineye/internete)
    # açık olması gereksiz bir saldırı yüzeyi yaratır.
    volumes:
      - pgdata:/var/lib/postgresql/data # Named volume: Container silinse bile veriler kalıcı olur

  # 3. React Frontend (Week 9) — Nginx ile statik dosya sunumu
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # DİKKAT: Burada 'app' servis adı DEĞİL, host adresi kullanılıyor.
        # Çünkü API isteğini yapan taraf client container'ı değil, kullanıcının
        # TARAYICISIDIR — tarayıcı Docker ağının dışında yaşar ve 'app'
        # host adını çözemez; backend'e host'a açılan port üzerinden ulaşır.
        # (Vite env'leri build anında bundle'a gömülür; bkz. client/Dockerfile)
        VITE_API_URL: http://localhost:3000
    container_name: http-lab-client
    restart: unless-stopped
    ports:
      # Dev sunucusuyla (npm run dev) aynı port alışkanlığı: 5173.
      # Böylece backend'in CORS izni (FRONTEND_URL=http://localhost:5173)
      # her iki çalıştırma yöntemi için de aynı kalır.
      - "5173:80"
    depends_on:
      - app

  # 4. Veritabanı Yönetim Arayüzü (Geliştirme için)
  adminer:
    image: adminer
    container_name: http-lab-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

# Docker tarafından yönetilecek kalıcı disk alanları
volumes:
  pgdata: