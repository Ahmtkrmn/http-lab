server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router'ın olmazsa olmazı:
    # Kullanıcı /items adresine DOĞRUDAN girerse (F5 veya link paylaşımı),
    # sunucuda /items diye bir dosya YOKTUR; route'lar tarayıcıda, JS
    # tarafında yaşar. try_files, dosya bulunamayınca index.html'i döner ve
    # yönlendirme kararını React Router'a bırakır. Bu satır olmasaydı /items'a
    # F5 basmak Nginx'in 404'üyle sonuçlanırdı.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite, /assets altındaki dosya adlarına içerik hash'i gömer
    # (index-a1b2c3.js): içerik değişirse AD da değişir. Bu yüzden bu
    # dosyalar sonsuza dek cache'lenebilir (immutable) — güncelleme,
    # index.html'in yeni hash'li ada işaret etmesiyle gelir.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
