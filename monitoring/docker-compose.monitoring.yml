# Grafana Alloy collector'ı Docker'da çalıştırır.
#
# Neden ayrı bir compose dosyası? Bu, uygulamanın (app+db) ana
# docker-compose.yml'inden BAĞIMSIZ bir izleme aracıdır — canlıdaki
# (Render'daki) /metrics'i uzaktan yoklar, yerel app'i değil. Ana stack'i
# kirletmemek için ayrı tutuyoruz.
#
# Çalıştırma (monitoring/ klasörünün İÇİNDEN):
#   docker compose -f docker-compose.monitoring.yml up
#
# Önce .env.monitoring.example'ı .env.monitoring olarak kopyalayıp doldur.

services:
  alloy:
    image: grafana/alloy:latest
    container_name: http-lab-alloy
    # Alloy'un varsayılan entrypoint'i `alloy`; ona config'i çalıştırmasını söylüyoruz.
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      # Config'i salt-okunur (ro) mount et.
      - ./config.alloy:/etc/alloy/config.alloy:ro
    env_file:
      # Sırlar burada (GRAFANA_CLOUD_*, METRICS_TOKEN, SCRAPE_TARGET).
      - .env.monitoring
    ports:
      # Alloy'un kendi arayüzü/health'i: http://localhost:12345
      # (Alloy'un DOĞRU çalışıp scrape edip etmediğini buradan görebilirsin.)
      - "12345:12345"
    restart: unless-stopped
